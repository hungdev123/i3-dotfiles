[colors]
bg = #1e1e2e
fg = #cdd6f4
blue = #89b4fa
gray = #6c7086

[bar/main]
width = 100%
height = 32

offset-x = 2%
offset-y = 10
radius = 12

background = ${colors.bg}
foreground = ${colors.fg}

padding-left = 3
padding-right = 3

module-margin = 2

font-0 = "JetBrainsMono Nerd Font:size=10;3"

modules-left = i3
modules-center = date
modules-right = wlan pulseaudio powermenu

wm-restack = i3
enable-ipc = true

border-size = 2
border-color = ${colors.primary}

[module/i3]
type = internal/i3

pin-workspaces = true
strip-wsnumbers = true

label-focused = 
label-focused-foreground = ${colors.blue}
label-focused-padding = 1

label-unfocused = 
label-unfocused-foreground = ${colors.gray}
label-unfocused-padding = 1

[module/date]
type = internal/date

interval = 1

date = %H:%M

label =  %date%

click-left = ~/.config/rofi/calendar.sh

[module/wlan]
type = internal/network

interface = wlp2s0
interval = 3

format-connected = 󰖩 <label-connected>
label-connected = %essid%

format-disconnected = 󰖪 offline

[module/pulseaudio]
type = internal/pulseaudio

format-volume =   <label-volume>
label-volume = %percentage%%

label-muted = 󰖁 muted

[module/powermenu]
type = custom/text

content = ⏻
content-foreground = ${colors.blue}

click-left = ~/.config/polybar/powermenu.sh
